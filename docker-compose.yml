services:
  postgres:
    image: postgres:15.6
    container_name: postgres
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    image: backend
    container_name: backend
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"

  frontend:
    image: frontend
    container_name: frontend
    ports:
      - "3000:80"

volumes:
  pgdata: